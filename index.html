<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشروع التاريخي: عقد التسعينات</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f4f6f7;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            padding: 40px 0;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0 0 10px; font-size: 2.2rem; }
        header p { margin: 0; font-size: 1.1rem; opacity: 0.9; }

        .timeline {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 0;
        }
        
        /* خط طولي نحيف في وسط الشاشة من فوق إلى تحت */
        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: #bdc3c7;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
            z-index: 1;
        }

        .timeline-item {
            position: relative;
            width: 50%;
            margin-bottom: 50px;
            box-sizing: border-box;
        }

        /* توزيع المربعات يميناً ويساراً بالتناوب */
        .timeline-item.left {
            left: 0;
            padding-left: 30px;
        }
        .timeline-item.right {
            left: 50%;
            padding-right: 30px;
        }

        /* مربعات النص والمعلومات */
        .timeline-content {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border-top: 4px solid var(--primary-color);
            text-align: right;
        }

        /* النقط الدائرية لربط الأحداث بالخط الأوسط */
        .timeline-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: var(--accent-color);
            border: 3px solid white;
            top: 25px;
            z-index: 3;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .timeline-item.left .timeline-dot { right: -10px; }
        .timeline-item.right .timeline-dot { left: -10px; }

        /* خطوط امتداد الفترات الجانبية الملونة (أخضر للدول وأزرق للشخصيات) */
        .span-line {
            position: absolute;
            width: 4px;
            top: 38px;
            bottom: -55px;
            z-index: 2;
        }
        .timeline-item.left .span-line { right: -5px; }
        .timeline-item.right .span-line { left: -5px; }
        
        .line-state { background-color: #27ae60; } /* أخضر للدول */
        .line-person { background-color: #2980b9; } /* أزرق للشخصيات */

        /* تفاصيل المحتوى الداخلي */
        .meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 5px;
        }
        .event-date { font-weight: bold; color: var(--accent-color); }
        .event-type { background: #e8f8f5; padding: 2px 8px; border-radius: 4px; color: #16a085; font-size: 0.8rem; }
        .event-text { line-height: 1.6; font-size: 0.95rem; color: #2c3e50; margin: 5px 0; }
        .extra-details { font-size: 0.85rem; color: #7f8c8d; margin-top: 8px; background: #fdfefe; padding: 5px; border-radius: 4px; }
        .event-img { max-width: 100%; height: auto; border-radius: 6px; margin-top: 10px; display: block; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        @media (max-width: 768px) {
            .timeline::after { left: 20px; }
            .timeline-item { width: 100%; left: 0 !important; padding-left: 35px !important; padding-right: 0 !important; }
            .timeline-dot { left: 10px !important; right: auto !important; }
            .span-line { left: 15px !important; right: auto !important; }
        }
    </style>
</head>

            imgHtml = `<img src="${ev.image}" class="event-img" alt="صورة" onerror="this.style.display='none';">`;
        }

        item.innerHTML = `
            <div class="timeline-dot"></div>
            ${lineHtml}
            <div class="timeline-content">
                <div class="meta-info">
                    <span class="event-date">📅 ${dStr}</span>
                    <span class="event-type">${ev.type}</span>
                </div>
                <p class="event-text">${ev.text}</p>
                ${extHtml}
                ${imgHtml}
            </div>
        `;
        box.appendChild(item);
    });
</script>

</body>
</html>
